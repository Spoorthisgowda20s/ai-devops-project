<!DOCTYPE html>
<html>
<head>
    <title>AI Sales Forecast Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-success { background-color: #28a745; border: none; }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">AI Sales Forecast System</h2>
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <form action="/predict" method="post">
                        <label class="form-label">Marketing Spend ($)</label>
                        <input type="number" name="marketing" class="form-control mb-3" required>
                        <label class="form-label">Customer Visits</label>
                        <input type="number" name="visits" class="form-control mb-3" required>
                        <label class="form-label">Product Price ($)</label>
                        <input type="number" name="price" class="form-control mb-3" required>
                        <button type="submit" class="btn btn-success w-100">Predict Sales</button>
                    </form>
                </div>
            </div>

            {% if prediction_text %}
            <div class="col-md-6 mt-4 mt-md-0">
                <div class="card p-4 text-center">
                    <h3>{{ prediction_text }}</h3>
                    <div class="chart-container">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>
            </div>
            {% endif %}
        </div>
    </div>

    <script>
        // Only run if prediction_text exists
        {% if prediction_text %}
        const ctx = document.getElementById('salesChart').getContext('2d');
        const predictedValue = parseFloat("{{ prediction_text }}".replace(/[^0-9.]/g, ''));
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Target Sales', 'Predicted Sales'],
                datasets: [{
                    label: 'Revenue in USD',
                    data: [8000, predictedValue], // Comparing against a fixed target
                    backgroundColor: ['#dee2e6', '#28a745'],
                    borderRadius: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } }
            }
        });
        {% endif %}
    </script>
</body>
</html>
