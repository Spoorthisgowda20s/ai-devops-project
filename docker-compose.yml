version: "3"

services:

  dev:
    image: aiapp
    container_name: aiapp-dev
    ports:
      - "8081:8080"
    environment:
      - ENV=DEV

  test:
    image: aiapp
    container_name: aiapp-test
    ports:
      - "8082:8080"
    environment:
      - ENV=TEST

  prod:
    image: aiapp
    container_name: aiapp-prod
    ports:
      - "8083:8080"
    environment:
      - ENV=PROD